<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEK Voice AI - తెలుగు వాయిస్ మిత్ర</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #001f3f, #ff69b4);
    color: white;
    text-align: center;
}
.container {
    padding: 40px 20px;
}
.logo {
    font-size: 40px;
    font-weight: bold;
}
h1 {
    font-size: 32px;
}
p {
    font-size: 20px;
}
.box {
    background: white;
    color: #222;
    border-radius: 20px;
    padding: 25px;
    margin: 30px auto;
    max-width: 400px;
}
button {
    width: 90%;
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
    background: #007bff;
    color: white;
}
button:hover {
    opacity: 0.8;
}
/* కొత్తగా వచ్చిన టెక్స్ట్ బాక్స్ డిజైన్ */
#outputBox {
    min-height: 60px;
    margin-top: 15px;
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 10px;
    background: #f9f9f9;
    font-size: 18px;
    color: #333;
}
.footer {
    margin-top: 40px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">D.E.K</div>
    <h1>🎤 DEK Voice AI</h1>
    <p>మాట్లాడు... పని చేయించు</p>

    <div class="box">
        <button id="startSpeech">🎙️ మాట్లాడితే రాయించు</button>
        
        <!-- మనం మాట్లాడింది ఇక్కడ కనిపిస్తుంది -->
        <div id="outputBox">మీరు మాట్లాడినది ఇక్కడ వస్తుంది...</div>

        <button>🔊 రాతను వినిపించు (త్వరలో)</button>
        <button>🤖 తెలుగు AI సహాయం (త్వరలో)</button>
    </div>

    <p>తెలుగు ప్రజల కోసం సులభమైన వాయిస్ సహాయకుడు</p>
    <div class="footer">© 2026 DEK Voice AI</div>
</div>

<script>
    const startBtn = document.getElementById('startSpeech');
    const outputBox = document.getElementById('outputBox');

    // వాయిస్ రికగ్నిషన్ సెటప్
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if(SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'te-IN'; // తెలుగు భాషను అర్థం చేసుకోవడానికి

        startBtn.addEventListener('click', () => {
            recognition.start();
            outputBox.innerHTML = "వింటున్నాను... తెలుగులో మాట్లాడండి 🎤";
        });

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            outputBox.innerHTML = transcript;
        };

        recognition.onerror = (event) => {
            outputBox.innerHTML = "క్షమించండి, సరిగ్గా వినిపించలేదు. మళ్ళీ బటన్ నొక్కి మాట్లాడండి.";
        };
    } else {
        outputBox.innerHTML = "మీ బ్రౌజర్ వాయిస్ రికగ్నిషన్‌కి సపోర్ట్ చేయడం లేదు. దయచేసి Google Chrome వాడండి.";
    }
</script>

</body>
</html>
