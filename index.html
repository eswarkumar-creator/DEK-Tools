<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- బ్రౌజర్ పాత ఫైల్స్ గుర్తుపెట్టుకోకుండా ఉండటానికి ఈ సెట్టింగ్స్ -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>DEK Voice AI</title>
<style>
body { margin: 0; font-family: sans-serif; background: linear-gradient(135deg, #001f3f, #ff69b4); color: white; text-align: center; }
.container { padding: 20px; }
.box { background: white; color: #222; border-radius: 20px; padding: 25px; margin: 30px auto; max-width: 400px; }
button { width: 90%; padding: 15px; margin: 10px; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; transition: 0.3s; }
.btn-green { background: #28a745 !important; }
.button-row { display: flex; justify-content: space-between; width: 90%; margin: 10px auto; }
.action-btn { width: 48% !important; font-size: 16px !important; padding: 12px 5px !important; margin: 0 !important; border-radius: 15px !important; }
.copy-btn { background: #ff9800; }
.clear-btn { background: #dc3545; }
textarea { width: 100%; min-height: 150px; margin-top: 15px; padding: 10px; border: 2px solid #007bff; border-radius: 10px; box-sizing: border-box; font-size: 18px; }
</style>
</head>
<body>

<div class="container">
    <h1>D.E.K Voice AI</h1>
    <div class="box">
        <button id="startSpeech">🎙️ మాట్లాడితే రాయించు</button>
        <textarea id="outputBox" placeholder="మీరు మాట్లాడినది ఇక్కడ వస్తుంది..."></textarea>
        
        <div class="button-row">
            <button id="copyBtn" class="action-btn copy-btn">📋 కాపీ</button>
            <button id="clearBtn" class="action-btn clear-btn">🗑️ క్లియర్</button>
        </div>

        <button id="speakText" style="background: #007bff;">🔊 రాతను వినిపించు</button>
    </div>
</div>

<script>
    const startBtn = document.getElementById('startSpeech');
    const outputBox = document.getElementById('outputBox');
    const speakBtn = document.getElementById('speakText');

    // Speech Recognition
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'te-IN';
    recognition.continuous = true;

    startBtn.onclick = () => {
        if(startBtn.classList.contains('btn-green')) {
            recognition.stop();
            startBtn.classList.remove('btn-green');
            startBtn.innerText = "🎙️ మాట్లాడితే రాయించు";
        } else {
            recognition.start();
            startBtn.classList.add('btn-green');
            startBtn.innerText = "🔴 ఆపడానికి నొక్కండి";
        }
    };

    recognition.onresult = (e) => {
        let transcript = '';
        for (let i = 0; i < e.results.length; ++i) {
            transcript += e.results[i][0].transcript;
        }
        outputBox.value = transcript;
    };

    // Text to Speech
    speakBtn.onclick = () => {
        if(window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            speakBtn.innerText = "🔊 రాతను వినిపించు";
        } else {
            const msg = new SpeechSynthesisUtterance(outputBox.value);
            msg.lang = 'te-IN';
            speakBtn.innerText = "⏹️ ఆపు";
            window.speechSynthesis.speak(msg);
            msg.onend = () => speakBtn.innerText = "🔊 రాతను వినిపించు";
        }
    };

    // Copy & Clear
    document.getElementById('copyBtn').onclick = () => navigator.clipboard.writeText(outputBox.value);
    document.getElementById('clearBtn').onclick = () => outputBox.value = "";
</script>
</body>
</html>
